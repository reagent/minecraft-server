---
- hosts: minecraft
  user: root

  vars_files:
    - ../vars/credentials.yml
    - ../vars/server.yml

  tasks:
    - name: Shutdown Minecraft server
      service:
        name: minecraft
        state: stopped

    - name: Unmount shared volume
      ansible.posix.mount:
        path: "{{ minecraft_home | dirname }}"
        state: unmounted

    - name: Destroy DigitalOcean server
      community.digitalocean.digital_ocean_droplet:
        state: absent
        oauth_token: "{{ credentials.digital_ocean.api_key }}"
        name: "{{ server.name }}"
        unique_name: yes
        wait: yes
      delegate_to: localhost

    - name: Destroy inventory
      file:
        path: ../inventory
        state: absent
      delegate_to: localhost

    - name: Remove hostname from DNSimple
      community.general.dnsimple:
        account_email: "{{ credentials.dnsimple.account_email }}"
        account_api_token: "{{ credentials.dnsimple.account_api_token }}"
        domain: "{{ dns.domain }}"
        record: "{{ dns.hostname | default(server.name) }}"
        type: A
        value: "{{ ansible_default_ipv4.address }}"
        state: absent
      delegate_to: localhost
      when:
        - dns is defined
        - dns.domain is defined
        - credentials is defined
        - credentials.dnsimple is defined
        - credentials.dnsimple.account_email is defined
        - credentials.dnsimple.account_api_token is defined
